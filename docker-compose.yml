services:
  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - app-internal

  orchestrator:
    build:
      context: ./orchestrator
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - 8080
    networks:
      - app-internal
      - dokploy-network

networks:
  app-internal:
    driver: bridge
    internal: true
  dokploy-network:
    external: true
